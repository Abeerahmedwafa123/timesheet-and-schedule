<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Abir Wafa · Weekly Schedule &amp; Timesheet · Monglish</title>
<style>
:root{
  color-scheme:light;
  --teal-900:#0F3B52; --teal-800:#174E6A; --teal-700:#1F5E7A; --teal-600:#2C7193;
  --teal-300:#B4D1DF; --teal-200:#D9E7EE; --teal-100:#ECF3F6; --teal-50:#F5F9FB;
  --orange-700:#D66A00; --orange-600:#F57C00; --orange-100:#FFF3E3; --orange-50:#FFFAF2;
  --ink-900:#0E1A22; --ink-700:#334049; --ink-600:#4D5863; --ink-500:#6B7680;
  --ink-400:#96A0A9; --ink-300:#C2CAD2; --ink-200:#E0E5EA; --ink-100:#EEF1F4; --ink-50:#F6F8FA;
  --border:#E0E5EA; --white:#fff;
  --font-display:'Georgia','Times New Roman',serif;
  --font-sans:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  --shadow-xs:0 1px 2px rgba(15,59,82,.06);
  --shadow-sm:0 2px 6px rgba(15,59,82,.08);
  --shadow-md:0 6px 16px -4px rgba(15,59,82,.12),0 2px 4px rgba(15,59,82,.05);
  --shadow-lg:0 16px 32px -8px rgba(15,59,82,.16),0 4px 8px rgba(15,59,82,.06);
  --shadow-accent:0 10px 24px -8px rgba(245,124,0,.45);
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:var(--font-sans);color:var(--ink-900);min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(at 20% 10%, rgba(31,94,122,.10), transparent 40%),
    radial-gradient(at 80% 20%, rgba(245,124,0,.08), transparent 40%),
    radial-gradient(at 70% 90%, rgba(31,94,122,.08), transparent 45%),
    radial-gradient(at 10% 80%, rgba(245,124,0,.06), transparent 40%),
    linear-gradient(180deg,#F5F9FB 0%,#ECF3F6 100%);
  background-attachment:fixed;
}

/* HEADER */
.app-header{display:flex;align-items:center;gap:18px;padding:16px 28px;
  background:rgba(255,255,255,.8);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-wrap:wrap;}
.logo-img{height:42px;width:auto;max-width:170px;object-fit:contain;flex-shrink:0;}
.header-divider{width:1px;height:38px;background:var(--border);}
.header-title{display:flex;flex-direction:column;gap:1px;}
.header-title .eyebrow{font-weight:800;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange-600);}
.header-title h1{font-family:var(--font-display);font-weight:700;font-size:21px;color:var(--teal-900);letter-spacing:-.01em;}
.header-title p{font-size:11px;color:var(--ink-500);font-weight:600;}
.header-spacer{flex:1;}
.tabs{display:flex;gap:4px;padding:4px;background:var(--teal-100);border-radius:999px;border:1px solid var(--teal-200);}
.tab{border:none;background:transparent;cursor:pointer;padding:8px 18px;border-radius:999px;
  font-family:var(--font-sans);font-weight:800;font-size:13px;color:var(--teal-800);
  transition:all .22s var(--ease);display:inline-flex;align-items:center;gap:7px;}
.tab:hover{color:var(--teal-900);}
.tab.active{background:#fff;color:var(--teal-900);box-shadow:var(--shadow-sm);}
.tab span.ic{font-size:14px;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:14px;padding:16px 28px;background:rgba(255,255,255,.5);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.week-nav{display:flex;align-items:center;gap:6px;}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--teal-800);font-size:18px;
  transition:all .22s var(--ease);}
.icon-btn:hover{background:var(--teal-50);border-color:var(--teal-300);transform:translateY(-1px);}
.icon-btn:active{transform:scale(.96);}
.week-label{font-weight:800;font-size:16px;color:var(--teal-900);min-width:210px;text-align:center;letter-spacing:-.01em;}
.today-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:#fff;
  font-family:var(--font-sans);font-weight:800;font-size:13px;color:var(--teal-800);cursor:pointer;transition:all .22s var(--ease);}
.today-btn:hover{background:var(--teal-50);border-color:var(--teal-300);}
.toolbar-spacer{flex:1;}
.sync-badge{font-size:11px;font-weight:700;color:var(--ink-500);white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--orange-600);box-shadow:0 0 0 4px rgba(245,124,0,.15);}
.btn-primary{padding:9px 16px;border-radius:10px;border:none;background:var(--orange-600);color:#fff;
  font-family:var(--font-sans);font-weight:800;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  box-shadow:var(--shadow-accent);transition:all .22s var(--ease);}
.btn-primary:hover{background:var(--orange-700);transform:translateY(-1px);}
.btn-primary:active{transform:scale(.97);}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:22px 28px 4px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:16px 20px;
  display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-xs);transition:all .22s var(--ease);position:relative;overflow:hidden;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.stat-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;}
.stat-meta{display:flex;flex-direction:column;}
.stat-meta .label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-500);}
.stat-meta .value{font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--teal-900);line-height:1.1;}
.stat-meta .sub{font-size:11px;font-weight:600;color:var(--ink-500);margin-top:1px;}
.accent-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;}

/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:16px 28px 0;}
.legend-item{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;background:#fff;border:1px solid var(--border);
  border-radius:999px;font-size:12px;font-weight:700;color:var(--ink-700);box-shadow:var(--shadow-xs);}
.legend-item .dot{width:9px;height:9px;border-radius:3px;}

/* CALENDAR */
.schedule-shell{margin:18px 28px 36px;background:#fff;border:1px solid var(--border);border-radius:26px;box-shadow:var(--shadow-sm);overflow:hidden;}
.cal-scroll{overflow-x:auto;}
.calendar-grid{display:grid;grid-template-columns:64px repeat(7,minmax(120px,1fr));min-width:820px;}
.time-corner{background:var(--teal-50);border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.day-header{padding:12px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);background:var(--teal-50);
  display:flex;flex-direction:column;gap:2px;}
.day-header:last-child{border-right:none;}
.day-header .dow{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-500);}
.day-header .dnum{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--teal-900);line-height:1.1;}
.day-header .dhrs{font-size:10px;color:var(--ink-400);font-weight:700;}
.day-header.today{background:linear-gradient(180deg,var(--orange-50),var(--orange-100));border-bottom:2px solid var(--orange-600);}
.day-header.today .dnum,.day-header.today .dow{color:var(--orange-700);}
.day-header.off{background:var(--ink-50);}
.day-header.off .dnum,.day-header.off .dow{color:var(--ink-400);}
.day-header .offtag{display:inline-block;margin-top:2px;padding:1px 7px;border-radius:999px;background:var(--ink-100);color:var(--ink-600);font-size:9px;font-weight:800;letter-spacing:.06em;width:fit-content;}
.time-col{border-right:1px solid var(--border);background:#fff;}
.time-label{font-size:10px;font-weight:700;color:var(--ink-400);text-align:right;padding:4px 7px 0 0;border-bottom:1px solid var(--ink-100);}
.day-col{border-right:1px solid var(--border);position:relative;background-repeat:repeat;}
.day-col:last-child{border-right:none;}
.day-col.off{background-image:repeating-linear-gradient(45deg,var(--ink-50) 0,var(--ink-50) 12px,transparent 12px,transparent 24px);}
.day-col.off .dayoff-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-12deg);
  font-family:var(--font-display);font-style:italic;font-size:20px;font-weight:600;color:var(--ink-300);pointer-events:none;}
.hour-line{position:absolute;left:0;right:0;border-bottom:1px solid var(--ink-100);}
.event{position:absolute;left:4px;right:4px;border-radius:11px;padding:6px 9px;cursor:pointer;overflow:hidden;
  box-shadow:var(--shadow-xs);transition:transform .2s var(--ease),box-shadow .2s var(--ease);border-left:3px solid;z-index:2;
  animation:evIn .4s var(--ease) backwards;}
.event:hover{transform:translateY(-2px) scale(1.01);box-shadow:var(--shadow-md);z-index:20;}
.event .e-title{font-size:11px;font-weight:800;line-height:1.25;overflow:hidden;}
.event .e-title.clip{white-space:nowrap;text-overflow:ellipsis;}
.event .e-meta{font-size:9px;font-weight:700;opacity:.78;margin-top:2px;white-space:nowrap;}
@keyframes evIn{from{opacity:0;transform:translateY(8px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--orange-600);z-index:25;pointer-events:none;box-shadow:0 0 10px rgba(245,124,0,.5);}
.now-line::before{content:'';position:absolute;left:-5px;top:-5px;width:11px;height:11px;background:var(--orange-600);border-radius:50%;box-shadow:0 0 0 4px rgba(245,124,0,.18);}
.c-meet{background:#FFF3E0;color:#BF360C;border-color:#F57C00;}
.c-work{background:#E3F1F8;color:#0d4160;border-color:#1F5E7A;}
.c-report{background:#E8F5E9;color:#1B5E20;border-color:#43A047;}
.c-auto{background:#EDE7F6;color:#311B92;border-color:#7E57C2;}
.c-speak{background:#FCE4EC;color:#880E4F;border-color:#E91E63;}

/* TIMESHEET */
.timesheet-shell{margin:18px 28px 22px;background:#fff;border:1px solid var(--border);border-radius:26px;box-shadow:var(--shadow-sm);overflow:hidden;}
.ts-header{padding:18px 26px;background:linear-gradient(135deg,var(--teal-700),var(--teal-800));color:#fff;display:flex;align-items:center;gap:20px;position:relative;overflow:hidden;}
.ts-header::before{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(245,124,0,.4),transparent 70%);}
.ts-header h2{font-family:var(--font-display);font-weight:700;font-size:22px;position:relative;}
.ts-header .ts-period{font-size:13px;font-weight:600;opacity:.85;position:relative;margin-top:2px;}
.ts-header-spacer{flex:1;}
.ts-header .ts-total{position:relative;text-align:right;}
.ts-header .ts-total .n{font-family:var(--font-display);font-weight:700;font-size:28px;line-height:1;}
.ts-header .ts-total .l{font-size:11px;font-weight:700;opacity:.85;letter-spacing:.1em;text-transform:uppercase;}
.ts-table{width:100%;border-collapse:collapse;}
.ts-table thead th{padding:13px 16px;text-align:left;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-500);background:var(--teal-50);border-bottom:1px solid var(--border);}
.ts-table thead th:last-child{text-align:right;}
.ts-table tbody td{padding:13px 16px;border-bottom:1px solid var(--ink-100);font-size:14px;vertical-align:middle;}
.ts-table tbody tr{transition:background .2s var(--ease);animation:rowIn .4s var(--ease) backwards;}
@keyframes rowIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.ts-table tbody tr:hover{background:var(--teal-50);}
.ts-table tbody tr.off-row td{color:var(--ink-400);font-style:italic;background:var(--ink-50);}
.ts-day{display:flex;align-items:center;gap:12px;}
.ts-day-num{width:38px;height:38px;border-radius:12px;background:var(--teal-100);color:var(--teal-800);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:18px;flex-shrink:0;}
.ts-day.today .ts-day-num{background:var(--orange-600);color:#fff;}
.ts-day-meta{display:flex;flex-direction:column;}
.ts-day-meta .name{font-weight:800;color:var(--ink-900);font-size:14px;}
.ts-day-meta .dt{font-size:11px;color:var(--ink-500);font-weight:600;}
.hours-cell{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--teal-900);}
.hours-cell .unit{font-size:11px;color:var(--ink-500);margin-left:2px;font-family:var(--font-sans);font-weight:700;}
.tasks-cell{display:flex;flex-wrap:wrap;gap:6px;max-width:360px;}
.task-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid;}
.task-chip .dot{width:6px;height:6px;border-radius:50%;}
.ts-bar{height:26px;background:var(--ink-100);border-radius:8px;overflow:hidden;display:flex;width:200px;}
.ts-bar-seg{height:100%;position:relative;}
.ts-bar-seg::after{content:attr(data-label);position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-shadow:0 1px 2px rgba(0,0,0,.25);}
.status-cell{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:#E4F3EB;color:#3FA66B;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
.status-cell .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.status-cell.off{background:var(--ink-100);color:var(--ink-500);}
.ts-table tfoot td{padding:16px;background:var(--teal-50);font-weight:800;color:var(--teal-900);border-top:2px solid var(--teal-200);}
.ts-table tfoot td.total{font-family:var(--font-display);font-size:22px;text-align:right;}

/* DISTRIBUTION */
.dist-shell{margin:0 28px 36px;display:grid;grid-template-columns:340px 1fr;gap:16px;}
.dist-card,.summary-card{background:#fff;border:1px solid var(--border);border-radius:22px;padding:20px 24px;box-shadow:var(--shadow-xs);}
.dist-card h4,.summary-card h4{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--teal-900);margin-bottom:14px;}
.dist-body{display:flex;align-items:center;gap:20px;}
.donut{flex-shrink:0;}
.dist-list{display:flex;flex-direction:column;gap:9px;flex:1;}
.dist-row{display:flex;align-items:center;gap:10px;font-size:12px;}
.dist-row .dot{width:9px;height:9px;border-radius:50%;}
.dist-row .label{font-weight:700;color:var(--ink-700);}
.dist-row .val{margin-left:auto;font-weight:800;color:var(--teal-900);font-family:var(--font-display);}
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.summary-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--ink-100);border-radius:14px;background:var(--teal-50);}
.summary-item .si-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.summary-item .si-v{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--teal-900);line-height:1;}
.summary-item .si-l{font-size:11px;font-weight:700;color:var(--ink-500);margin-top:2px;}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(15,30,45,.4);backdrop-filter:blur(5px);}
.overlay.open{display:flex;}
.modal{background:#fff;width:440px;max-width:calc(100vw - 28px);border-radius:22px;box-shadow:var(--shadow-lg);overflow:hidden;animation:modalIn .35s var(--ease);}
@keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);background:var(--teal-50);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.modal-head h3{font-family:var(--font-display);font-weight:700;font-size:19px;color:var(--teal-900);line-height:1.3;}
.pop-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink-400);line-height:1;}
.pop-tag{display:inline-flex;padding:3px 11px;border-radius:999px;font-size:9px;font-weight:800;letter-spacing:.06em;margin-bottom:9px;}
.modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:10px;}
.pop-row{font-size:13px;color:var(--ink-700);display:flex;align-items:flex-start;gap:9px;}
.pop-row .ico{font-size:14px;flex-shrink:0;}
.pop-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.pop-btn{padding:8px 14px;border-radius:9px;text-decoration:none;font-size:12px;font-weight:800;color:#fff;display:inline-block;}
.pop-btn.teams{background:#5464D8;}
.pop-btn.outlook{background:var(--teal-700);}

/* LOADING */
.loading{position:fixed;inset:0;z-index:500;background:rgba(245,249,251,.94);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.spin{width:38px;height:38px;border:3px solid var(--teal-200);border-top-color:var(--teal-700);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-text{font-size:13px;color:var(--ink-500);font-weight:700;}
.hidden{display:none!important;}

/* PRINT */
@media print{
  @page{size:A4 landscape;margin:10mm;}
  body{background:#fff!important;}
  .app-header{position:static;background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .toolbar,.tabs,.btn-primary,.icon-btn,.today-btn,.sync-badge,.loading,.overlay,.header-spacer{display:none!important;}
  .schedule-shell,.timesheet-shell,.dist-shell{box-shadow:none!important;break-inside:avoid;}
  .event,.day-header.today,.ts-header,.stat-icon,.task-chip,.ts-bar-seg,.status-cell,.ts-table thead th,.ts-table tfoot td,.day-col.off{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .cal-scroll{overflow:visible;}
}

/* RESPONSIVE */
@media(max-width:1100px){
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  .dist-shell{grid-template-columns:1fr;}
}
@media(max-width:760px){
  .app-header{padding:12px 16px;gap:10px;}
  .header-divider,.header-title p{display:none;}
  .tabs{order:99;width:100%;justify-content:center;}
  .tab{flex:1;justify-content:center;}
  .toolbar{padding:12px 16px;}
  .stats-bar{grid-template-columns:1fr 1fr;padding:16px 16px 0;}
  .schedule-shell,.timesheet-shell{margin:14px 16px;}
  .dist-shell{margin:0 16px 24px;}
  .ts-table,.ts-table thead,.ts-table tbody,.ts-table tr,.ts-table td{display:block;}
  .ts-table thead{display:none;}
  .ts-table tbody tr{border:1px solid var(--border);border-radius:14px;margin:12px 16px;padding:12px 14px;box-shadow:var(--shadow-xs);}
  .ts-table tbody td{border-bottom:none!important;padding:5px 0!important;}
  .ts-bar{width:100%!important;}
  .ts-table tfoot{display:block;}
  .ts-table tfoot tr{display:flex;flex-wrap:wrap;gap:8px 16px;margin:12px 16px;border:2px solid var(--teal-200);border-radius:14px;padding:14px;}
  .ts-table tfoot td{background:transparent!important;border:none!important;padding:0!important;}
}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spin"></div><div class="load-text" id="loadText">Loading your week…</div></div>

const SEED_SUNDAY=new Date('2026-05-24T00:00:00.000Z');
const EID_HOLIDAYS=new Set(['2026-05-25','2026-05-26','2026-05-27','2026-05-28','2026-05-30','2026-05-31','2026-06-01']);
function isEid(d){return EID_HOLIDAYS.has(isoDate(d));}
function isOff(d){return d.getUTCDay()===DAY_OFF||isEid(d);}

const CATS={
  meet:  {css:'c-meet',  label:'MEETING',            color:'#F57C00', scol:'#BF360C'},
  auto:  {css:'c-auto',  label:'AUTOMATION / CPD',   color:'#7E57C2', sol:'#311B92'},
  speak: {css:'c-speak', label:'SPEAKING / LANGUAGE',color:'#E91E63', sol:'#880E4F'},
  report:{css:'c-report',label:'REPORTING',          color:'#43A047', sol:'#1B5E20'},
  work:  {css:'c-work',  label:'DEEP WORK',          color:'#1F5E7A', sol:'#0d4160'},
};
const CAT_ORDER=['meet','auto','speak','report','work'];

let weekOffset=0, cachedEvents=[], currentTab='schedule';

/* ---------- date helpers ---------- */
function pad(n){return String(n).padStart(2,'0');}
function getSundayOf(off){const n=new Date();const s=new Date(n);s.setUTCDate(n.getUTCDate()-n.getUTCDay()+off*7);s.setUTCHours(0,0,0,0);return s;}
function addDays(d,n){const r=new Date(d);r.setUTCDate(d.getUTCDate()+n);return r;}
function isoDate(d){return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;}
function eetH(iso){const d=new Date(iso);return (d.getUTCHours()+TZ)%24 + d.getUTCMinutes()/60;}
function fmtTime(iso){const d=new Date(iso);let h=(d.getUTCHours()+TZ)%24,m=d.getUTCMinutes();const ap=h>=12?'PM':'AM';h=h%12||12;return `${h}:${pad(m)} ${ap}`;}
function durH(ev){return (new Date(ev.end)-new Date(ev.start))/3600000;}
function sameUTCDay(a,b){return a.getUTCFullYear()===b.getUTCFullYear()&&a.getUTCMonth()===b.getUTCMonth()&&a.getUTCDate()===b.getUTCDate();}
function isTodayUTC(d){const t=new Date();return sameUTCDay(d,t);}
function getWeekLabel(sun){const sat=addDays(sun,6);return `${MONTHS[sun.getUTCMonth()]} ${sun.getUTCDate()} – ${MONTHS[sat.getUTCMonth()]} ${sat.getUTCDate()}, ${sat.getUTCFullYear()}`;}

function classify(s){
  const t=(s||'').toLowerCase();
  if(t.includes('meeting')||t.includes('br follow')||t.includes('marketing plan')) return 'meet';
  if(t.includes('automat')||t.includes('workflow')||t.includes('cpd')||t.includes('classroom')||t.includes('n8n')||t.includes('ai training')||t.includes('block c')||t.includes('ai agent')||t.includes('mcp')) return 'auto';
  if(t.includes('speaking')||t.includes('business english')||t.includes('power up book')||t.includes('homespark')||t.includes('speaking app')||t.includes('speaking project')) return 'speak';
  if(t.includes('report')||t.includes('writing')||t.includes('reviewing')||t.includes('research')||t.includes('content review')) return 'report';
  return 'work';
}

function projectToWeek(sunday){
  const diff=sunday.getTime()-SEED_SUNDAY.getTime();
  return SEED_EVENTS.map(ev=>({...ev,
    start:new Date(new Date(ev.start).getTime()+diff).toISOString(),
    end:new Date(new Date(ev.end).getTime()+diff).toISOString()}));
}

function parseEvents(raw){
  if(!raw) return [];
  const str=typeof raw==='string'?raw:JSON.stringify(raw);
  const evs=[];const re=/\{(?:[^{}]|\{[^{}]*\})*\}/g;let m;
  while((m=re.exec(str))!==null){try{const o=JSON.parse(m[0]);if(o.subject&&o.start&&o.end)evs.push(o);}catch(e){}}
  return evs;
}

/* ---------- layout (column packing) ---------- */
function layoutEvents(evs){
  const sorted=[...evs].sort((a,b)=>new Date(a.start)-new Date(b.start));
  const cols=[];const result=[];
  for(const ev of sorted){
    const sh=eetH(ev.start);let placed=false;
    for(let ci=0;ci<cols.length;ci++){
      if(eetH(cols[ci][cols[ci].length-1].end)<=sh){cols[ci].push(ev);result.push({ev,col:ci});placed=true;break;}
    }
    if(!placed){cols.push([ev]);result.push({ev,col:cols.length-1});}
  }
  return result.map(r=>({...r,totalCols:cols.length}));
}

/* ---------- stats ---------- */
function computeCat(evs){
  const by={meet:0,auto:0,speak:0,report:0,work:0};let total=0;
  for(const e of evs){const h=durH(e);total+=h;by[classify(e.subject)]+=h;}
  return {by,total};
}

function renderStats(evs){
  const {by,total}=computeCat(evs);
  const meetCount=evs.filter(e=>classify(e.subject)==='meet'||(e.attendees&&e.attendees.length>1)).length;
  const cards=[
    {ic:'&#9201;',bg:'#ECF3F6',col:'#1F5E7A',val:total.toFixed(1)+'h',label:'Total hours',sub:'scheduled this week'},
    {ic:'&#128101;',bg:'#FFF3E0',col:'#F57C00',val:meetCount,label:'Meetings',sub:'incl. team syncs'},
    {ic:'&#9881;',bg:'#EDE7F6',col:'#7E57C2',val:(by.auto).toFixed(1)+'h',label:'Automation / CPD',sub:'build + training'},
    {ic:'&#128483;',bg:'#FCE4EC',col:'#E91E63',val:(by.speak).toFixed(1)+'h',label:'Speaking / Language',sub:'projects + apps'},
  ];
  document.getElementById('statsBar').innerHTML=cards.map(c=>
    `<div class="stat-card"><div class="accent-bar" style="background:${c.col}"></div>
      <div class="stat-icon" style="background:${c.bg};color:${c.col}">${c.ic}</div>
      <div class="stat-meta"><span class="label">${c.label}</span><span class="value">${c.val}</span><span class="sub">${c.sub}</span></div>
    </div>`).join('');
}

function renderLegend(){
  document.getElementById('legend').innerHTML=CAT_ORDER.map(k=>
    `<div class="legend-item"><span class="dot" style="background:${CATS[k].color}"></span>${CATS[k].label.charAt(0)+CATS[k].label.slice(1).toLowerCase().replace(' / ',' / ')}</div>`).join('');
}

/* ---------- calendar ---------- */
function renderCalendar(sunday,events){
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const days=Array.from({length:7},(_,i)=>addDays(sunday,i));
  const gridH=(H_END-H_START)*ROW_H;

  const corner=document.createElement('div');corner.className='time-corner';
  corner.innerHTML='<div style="font-size:8px;color:#b0c0cc;text-align:center;padding-top:12px;font-weight:800;letter-spacing:.1em">EET</div>';
  grid.appendChild(corner);

  for(let i=0;i<7;i++){
    const d=days[i];const off=isOff(d);const eid=isEid(d);const tod=isTodayUTC(d);
    const dEvs=events.filter(e=>sameUTCDay(new Date(e.start),d));
    const dh=dEvs.reduce((s,e)=>s+durH(e),0);
    const hd=document.createElement('div');
    hd.className=`day-header${tod?' today':''}${off?' off':''}`;
    hd.innerHTML=`<span class="dow">${DAYS_SHORT[d.getUTCDay()]}</span><span class="dnum">${d.getUTCDate()}</span>`+
      (off?`<span class="offtag">${eid?'Eid Vacation':'Day off'}</span>`:`<span class="dhrs">${dh>0?dh.toFixed(1)+'h':'—'}</span>`);
    grid.appendChild(hd);
  }

  // time column
  const tcol=document.createElement('div');tcol.className='time-col';
  for(let h=H_START;h<H_END;h++){
    const tl=document.createElement('div');tl.className='time-label';tl.style.height=ROW_H+'px';
    tl.textContent=h>12?`${h-12}pm`:h===12?'12pm':`${h}am`;
    tcol.appendChild(tl);
  }
  grid.appendChild(tcol);

  // day columns
  for(let i=0;i<7;i++){
    const d=days[i];const off=isOff(d);const eid=isEid(d);const tod=isTodayUTC(d);
    const col=document.createElement('div');col.className=`day-col${off?' off':''}`;col.style.height=gridH+'px';
    for(let h=1;h<H_END-H_START;h++){const ln=document.createElement('div');ln.className='hour-line';ln.style.top=(h*ROW_H)+'px';col.appendChild(ln);}
    if(off){const w=document.createElement('div');w.className='dayoff-watermark';w.textContent=eid?'Eid Vacation':'Day off';col.appendChild(w);}
    const dEvs=events.filter(e=>sameUTCDay(new Date(e.start),d));
    for(const {ev,col:c,totalCols} of layoutEvents(dEvs)){
      const sh=eetH(ev.start), endH=Math.min(eetH(ev.end),H_END);
      const top=(sh-H_START)*ROW_H, height=Math.max((endH-sh)*ROW_H-3,18);
      const gap=2, colW=(100-gap*(totalCols+1))/totalCols, left=gap+c*(colW+gap);
      const cat=CATS[classify(ev.subject)]||CATS.work;
      const el=document.createElement('div');
      el.className=`event ${cat.css}`;
      el.style.cssText=`top:${top}px;height:${height}px;left:${left}%;width:${colW}%;`;
      const dur=durH(ev).toFixed(1);
      el.innerHTML=`<div class="${height<40?'e-title clip':'e-title'}">${ev.subject||''}</div>`+
        (height>40?`<div class="e-meta">${fmtTime(ev.start)} · ${dur}h</div>`:'');
      el.addEventListener('click',e=>{e.stopPropagation();openPopup(ev);});
      col.appendChild(el);
    }
    if(tod){
      const now=new Date();const nh=(now.getUTCHours()+TZ)%24+now.getUTCMinutes()/60;
      if(nh>=H_START&&nh<=H_END){const nl=document.createElement('div');nl.className='now-line';nl.style.top=((nh-H_START)*ROW_H)+'px';col.appendChild(nl);}
    }
    grid.appendChild(col);
  }
}

/* ---------- timesheet ---------- */
function renderTimesheet(sunday,events){
  document.getElementById('tsPeriod').textContent=getWeekLabel(sunday);
  const days=Array.from({length:7},(_,i)=>addDays(sunday,i));
  const body=document.getElementById('tsBody');body.innerHTML='';
  let weekTotal=0;const weekBy={meet:0,auto:0,speak:0,report:0,work:0};let totalTasks=0;
  days.forEach((d,idx)=>{
    const off=isOff(d);const eid=isEid(d);const tod=isTodayUTC(d);
    const dEvs=events.filter(e=>sameUTCDay(new Date(e.start),d)).sort((a,b)=>new Date(a.start)-new Date(b.start));
    const dh=dEvs.reduce((s,e)=>s+durH(e),0);weekTotal+=dh;totalTasks+=dEvs.length;
    const by={meet:0,auto:0,speak:0,report:0,work:0};dEvs.forEach(e=>{const c=classify(e.subject);by[c]+=durH(e);weekBy[c]+=durH(e);});
    const tr=document.createElement('tr');tr.className=off?'off-row':'';tr.style.animationDelay=(idx*0.04)+'s';
    const chips=dEvs.slice(0,4).map(e=>{const cat=CATS[classify(e.subject)];return `<span class="task-chip" style="border-color:${cat.color};color:${cat.sol||cat.col||cat.color}"><span class="dot" style="background:${cat.color}"></span>${(e.subject||'').slice(0,26)}${(e.subject||'').length>26?'…':''}</span>`;}).join('');
    const more=dEvs.length>4?`<span class="task-chip" style="border-color:var(--ink-300);color:var(--ink-600)">+${dEvs.length-4} more</span>`:'';
    let segs='';if(dh>0){segs=CAT_ORDER.filter(k=>by[k]>0).map(k=>{const pct=by[k]/dh*100;return `<div class="ts-bar-seg" style="width:${pct}%;background:${CATS[k].color}" data-label="${pct>16?by[k].toFixed(1)+'h':''}"></div>`;}).join('');}
    tr.innerHTML=
      `<td><div class="ts-day${tod?' today':''}"><div class="ts-day-num">${d.getUTCDate()}</div><div class="ts-day-meta"><span class="name">${DAYS_LONG[d.getUTCDay()]}</span><span class="dt">${MONTHS[d.getUTCMonth()]} ${d.getUTCDate()}</span></div></div></td>`+
      `<td><span class="hours-cell">${off?'—':dh.toFixed(1)}<span class="unit">${off?'':'h'}</span></span></td>`+
      `<td>${off?(eid?'<span style="color:var(--ink-400)">Eid Vacation</span>':'<span style="color:var(--ink-400)">Day off</span>'):`<div class="tasks-cell">${chips}${more}</div>`}</td>`+
      `<td>${off?'':`<div class="ts-bar">${segs}</div>`}</td>`+
      `<td style="text-align:right">${off?'<span class="status-cell off"><span class="dot"></span>'+(eid?'Eid':'Off')+'</span>':'<span class="status-cell"><span class="dot"></span>Planned</span>'}</td>`;
    body.appendChild(tr);
  });
  document.getElementById('tsTotalH').textContent=weekTotal.toFixed(1)+'h';
  document.getElementById('tsFootH').innerHTML=weekTotal.toFixed(1)+'<span class="unit">h</span>';
  document.getElementById('tsFootTasks').textContent=totalTasks+' tasks';
  document.getElementById('tsFootTotal').textContent=weekTotal.toFixed(1)+'h';
  renderDistribution(weekBy,weekTotal,events);
}

function renderDistribution(by,total,events){
  // donut
  const size=130,r=52,cx=65,cy=65,circ=2*Math.PI*r;let offset=0;
  let segs='';
  CAT_ORDER.forEach(k=>{if(by[k]<=0||total<=0)return;const frac=by[k]/total;const len=frac*circ;
    segs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${CATS[k].color}" stroke-width="20" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"></circle>`;
    offset+=len;});
  document.getElementById('donut').innerHTML=
    `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#EEF1F4" stroke-width="20"></circle>${segs}
      <text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#0F3B52">${total.toFixed(0)}</text>
      <text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="9" font-weight="700" fill="#6B7680" letter-spacing="1">HOURS</text>
    </svg>`;
  document.getElementById('distList').innerHTML=CAT_ORDER.map(k=>{const h=by[k];const pct=total>0?(h/total*100):0;
    return `<div class="dist-row"><span class="dot" style="background:${CATS[k].color}"></span><span class="label">${CATS[k].label.charAt(0)+CATS[k].label.slice(1).toLowerCase()}</span><span class="val">${h.toFixed(1)}h · ${pct.toFixed(0)}%</span></div>`;}).join('');
  // summary
  const meetCount=events.filter(e=>classify(e.subject)==='meet'||(e.attendees&&e.attendees.length>1)).length;
  const workDays=Array.from({length:7},(_,i)=>i).filter(i=>i!==DAY_OFF).length;
  const busiest=CAT_ORDER.reduce((a,b)=>by[b]>by[a]?b:a,'work');
  const items=[
    {ic:'&#128197;',bg:'#ECF3F6',col:'#1F5E7A',v:total.toFixed(1)+'h',l:'Total logged'},
    {ic:'&#128101;',bg:'#FFF3E0',col:'#F57C00',v:meetCount,l:'Meetings'},
    {ic:'&#9989;',bg:'#E4F3EB',col:'#3FA66B',v:events.length,l:'Sessions'},
    {ic:'&#11088;',bg:'#FCE4EC',col:CATS[busiest].color,v:CATS[busiest].label.split(' ')[0],l:'Top focus'},
  ];
  document.getElementById('summaryGrid').innerHTML=items.map(it=>
    `<div class="summary-item"><div class="si-ic" style="background:${it.bg};color:${it.col}">${it.ic}</div><div><div class="si-v">${it.v}</div><div class="si-l">${it.l}</div></div></div>`).join('');
}

/* ---------- popup ---------- */
function maybeClose(e){if(e.target===document.getElementById('overlay'))closePopup();}
function closePopup(){document.getElementById('overlay').classList.remove('open');}
function openPopup(ev){
  const cat=CATS[classify(ev.subject)]||CATS.work;
  const t=document.getElementById('ptag');t.textContent=cat.label;t.style.background=cat.color+'22';t.style.color=cat.color;
  document.getElementById('ptitle').textContent=ev.subject||'Untitled';
  document.getElementById('ptime').children[1].textContent=`${fmtTime(ev.start)} – ${fmtTime(ev.end)} (EET)`;
  const dur=durH(ev).toFixed(1);
  document.getElementById('pdur').children[1].textContent=`${dur} hour${dur!=1?'s':''}`;
  const isMe=(ev.organizer||'').toLowerCase().includes('abeer');
  document.getElementById('porg').children[1].textContent=isMe?'Dr. Abir Wafa (organizer)':(ev.organizer||'');
  const attEl=document.getElementById('patt');
  if(ev.attendees&&ev.attendees.length>1){attEl.style.display='flex';
    const others=ev.attendees.filter(a=>!a.toLowerCase().includes('abeer'));
    attEl.children[1].textContent=others.slice(0,5).map(a=>a.split('@')[0].split('.').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ')).join(', ')+(others.length>5?` +${others.length-5} more`:'');
  }else attEl.style.display='none';
  const locEl=document.getElementById('ploc');
  if(ev.location){locEl.style.display='flex';locEl.children[1].textContent=ev.location;}else locEl.style.display='none';
  const wrap=document.getElementById('plinks');wrap.innerHTML='';
  const tm=(ev.summary||'').match(/https:\/\/teams\.microsoft\.com\/meet\/[^\s\r\n]+/);
  if(tm){const a=document.createElement('a');a.className='pop-btn teams';a.href=tm[0];a.target='_blank';a.textContent='Join Teams Meeting';wrap.appendChild(a);}
  if(ev.webLink&&ev.webLink.length>20){const a=document.createElement('a');a.className='pop-btn outlook';a.href=ev.webLink;a.target='_blank';a.textContent='Open in Outlook';wrap.appendChild(a);}
  document.getElementById('overlay').classList.add('open');
}

/* ---------- tabs ---------- */
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-schedule').classList.toggle('active',tab==='schedule');
  document.getElementById('tab-timesheet').classList.toggle('active',tab==='timesheet');
  document.getElementById('view-schedule').classList.toggle('hidden',tab!=='schedule');
  document.getElementById('view-timesheet').classList.toggle('hidden',tab!=='timesheet');
}

/* ---------- export ---------- */
function exportPrint(){window.print();}

/* ---------- load ---------- */
async function loadWeek(){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loading').style.display='flex';
  const sunday=getSundayOf(weekOffset), saturday=addDays(sunday,6);
  document.getElementById('weekLabel').textContent=getWeekLabel(sunday);

  const projected=projectToWeek(sunday);
  renderAll(sunday,projected);
  cachedEvents=projected;
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('syncBadge').innerHTML='<span class="sync-dot"></span> Syncing…';

  try{
    const cowork=window.cowork;
    if(!cowork) throw new Error('No cowork context');
    const raw=await cowork.callMcpTool(
      'mcp__76509d60-6875-44ab-8db0-1e0953eed9aa__outlook_calendar_search',
      {query:'*', afterDateTime:isoDate(sunday), beforeDateTime:isoDate(saturday), order:'oldest', limit:25}
    );
    const live=parseEvents(raw);
    if(live.length>0){cachedEvents=live;renderAll(sunday,live);}
    const now=new Date();const eetNowH=(now.getUTCHours()+TZ)%24;
    document.getElementById('syncBadge').innerHTML='<span class="sync-dot"></span> Synced '+pad(eetNowH)+':'+pad(now.getUTCMinutes());
  }catch(err){
    document.getElementById('syncBadge').innerHTML='<span class="sync-dot" style="background:#E8A838;box-shadow:0 0 0 4px rgba(232,168,56,.15)"></span> Pattern mode';
  }
}

function renderAll(sunday,events){
  const shown=events.filter(e=>!isOff(new Date(e.start)));
  renderStats(shown);
  renderLegend();
  renderCalendar(sunday,shown);
  renderTimesheet(sunday,shown);
}

function shiftWeek(d){weekOffset+=d;loadWeek();}
function jumpToday(){weekOffset=0;loadWeek();}

loadWeek();
